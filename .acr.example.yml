# AI Code Review 配置文件
# 复制为 .acr.yml 并修改

llm:
  # DeepSeek API Key (也可用环境变量 DEEPSEEK_API_KEY)
  api_key: ${DEEPSEEK_API_KEY}
  # API 地址
  base_url: https://api.deepseek.com
  # 模型名称
  model: deepseek-chat

review:
  # 默认审查维度: bugs, security, performance, style
  dimensions:
    - bugs
    - security
    - performance
    - style
  # 排除的文件模式
  exclude_patterns:
    - "*.lock"
    - "poetry.lock"
    - "package-lock.json"
    - "*.pyc"
  # 单文件最大大小 (bytes)
  max_file_size: 100000
  # diff 最大大小 (bytes)
  max_diff_size: 50000

output:
  # 默认输出格式: terminal, markdown, json
  format: terminal
  # 是否使用颜色
  color: true
